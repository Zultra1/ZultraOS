name: ZultraOS Build Factory
on: workflow_dispatch

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Maximize Build Space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc
          sudo apt clean

      - name: Set up Build Dependencies
        run: |
          sudo apt update
          sudo apt install bc bison build-essential curl flex g++-multilib gcc-multilib git gnupg gperf lib32ncurses5-dev lib32readline-dev lib32z1-dev liblz4-tool libncurses5 libncurses5-dev libsdl1.2-dev libssl-dev libxml2 libxml2-utils lzop pngcrush rsync schedtool squashfs-tools xsltproc zip zlib1g-dev

      - name: Initialize Repo
        run: |
          git config --global user.name "ZultraDeveloper"
          git config --global user.email "dev@zultra.os"
          repo init -u https://github.com/LineageOS/android.git -b lineage-23.2 --depth=1

      - name: Run Zultra Setup
        run: bash zultra_setup.sh

      - name: Start Compilation
        run: |
          source build/envsetup.sh
          breakfast greatlte
          brunch greatlte

      - name: Upload ZultraOS Image
        uses: actions/upload-artifact@v4
        with:
          name: ZultraOS-Note8-Build
          path: out/target/product/greatlte/*.zip
